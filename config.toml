# =============================================================================
#  Machine Mind — Zola configuration
#  Personal technical blog & portfolio of Saumil Patel
# =============================================================================

# The URL the site will be built for (GitHub user site: saumilp.github.io)
#base_url = "https://saumilp.github.io"
base_url = "https://saumilp-github-io.vercel.app"

# The default language; used in feeds and lang attributes.
default_language = "en"

title = "Machine Mind"
description = "Practical notes on software architecture, backend engineering, cloud systems, Rust, Java, and developer tooling."

# Compile Sass located in the `sass` directory (no Node build pipeline needed).
compile_sass = true

# Pagefind is used for search instead of Zola's built-in JSON index.
build_search_index = false

# Minify the generated HTML in production builds.
minify_html = true

# Never copy OS/editor junk into the built site.
ignored_content = ["**/.DS_Store", "**/Thumbs.db"]

# Atom feed generated automatically (Zola 0.18 supports a single feed).
generate_feed = true
feed_filename = "atom.xml"

# The default author for pages.
author = "Saumil Patel"

# Generate a sitemap.xml and robots.txt friendly output.
# (sitemap is generated automatically by Zola)

taxonomies = [
    { name = "tags", feed = true, paginate_by = 12 },
    { name = "categories", feed = true, paginate_by = 12 },
]

[markdown]
# Class-based syntax highlighting so light & dark themes can both be styled.
highlight_code = true
highlight_theme = "css"
highlight_themes_css = [
    { theme = "ayu-light", filename = "syntax-light.css" },
    { theme = "ayu-dark", filename = "syntax-dark.css" },
]
render_emoji = true
# Lazy-load + async-decode images, and make external links safe.
lazy_async_image = true
external_links_target_blank = true
external_links_no_follow = true
external_links_no_referrer = true
smart_punctuation = true

[link_checker]
# Skip local-dev URLs referenced inside tutorial content.
skip_prefixes = ["http://localhost", "https://localhost", "http://127.0.0.1", "https://127.0.0.1"]

[slugify]
paths = "on"
taxonomies = "on"
anchors = "on"

# -----------------------------------------------------------------------------
#  Extra: site-wide configurable data (brand, profile, social, projects, topics)
