{% import "macros/icons.html" as ic %}
{# Search modal. Pagefind assets are lazy-loaded by search.js on first open. #}
<div class="search-modal" id="search-modal" role="dialog" aria-modal="true" aria-labelledby="search-modal-title" data-open="false">
  <div class="search-modal__backdrop" data-search-close></div>
  <div class="search-modal__panel" role="document">
    <div class="search-modal__header">
      <span class="eyebrow" id="search-modal-title">{{ ic::icon(name="search", size=14) }} Search</span>
      <button type="button" class="icon-btn" data-search-close aria-label="Close search">{{ ic::icon(name="close", size=18) }}</button>
    </div>
    <div class="search-modal__body">
      <div id="pagefind-search"></div>
      <p class="search-empty" data-search-hint>Type to search articles and notes.</p>
    </div>
  </div>
</div>
