name: Redirect GitHub Pages to Vercel

# The canonical site is hosted on Vercel (https://saumilpgithubio.vercel.app).
# GitHub Pages now serves only a lightweight, path-preserving redirect so any
# old saumilp.github.io links forward to the Vercel deployment.

on:
  push:
    branches: [master, main]
  workflow_dispatch:

# Least-privilege permissions for Pages deployment via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-flight production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build redirect site
    runs-on: ubuntu-latest
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Generate redirect pages
        run: |
          mkdir -p _site
          # index.html handles the root; 404.html handles every deep link
          # (GitHub Pages serves 404.html for any path it can't find), and the
          # JS preserves pathname + query + hash so links land on the same page.
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Redirecting…</title>
            <link rel="canonical" href="https://saumilpgithubio.vercel.app/">
            <meta name="robots" content="noindex">
            <meta http-equiv="refresh" content="0; url=https://saumilpgithubio.vercel.app/">
            <script>
              location.replace(
                "https://saumilpgithubio.vercel.app" +
                location.pathname + location.search + location.hash
              );
            </script>
          </head>
          <body>
            <p>This site has moved to
              <a href="https://saumilpgithubio.vercel.app/">saumilpgithubio.vercel.app</a>.</p>
          </body>
          </html>
          HTML
          cp _site/index.html _site/404.html
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy redirect
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
